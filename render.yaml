services:
  - type: web
    name: safe-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXECUTION_MODE
        value: llm_api
      - key: UNCERTAINTY_THRESHOLD
        value: "0.60"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
